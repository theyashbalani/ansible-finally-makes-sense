---

- name: Setup Nginx HTML
  hosts: server
  become: true

  tasks:
    - name: Install Nginx
      apt:
        name: nginx
        state: present
        update_cache: yes
    - name: Copy the HTML file
      copy:
        src: index.html
        dest: /var/www/html
    - name: Restart Nginx
      systemd_service:
        name: nginx
        state: restarted
        enabled: true